name: Python CI

on:
  push:
    branches: [main]
    paths:
      - "**/*.py"
  pull_request:
    paths:
      - "**/*.py"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile check
        run: |
          python -m py_compile $(find . -name "*.py")
